# Decision thresholds for PPC Optimizer.
# Edit the values and rerun the analysis; no code changes are required.
# Rules are checked in this order: watch -> pause -> scale -> keep.

# WATCH: not enough spend to judge the product yet.
watch:
  max_cost: 300        # products with cost below this are watched (currency units)

# PAUSE: material spend without conversions.
pause:
  min_cost: 300        # minimum cost to consider pausing (currency units)
  max_conversions: 0   # pause only when conversions are at or below this value

# SCALE: strong, proven performance.
scale:
  min_roas: 100               # ROAS threshold in PERCENT (10 = 0.1x return; 1000 = 10x return)
  min_conversion_value: 5000 # minimum revenue from conversions (currency units)

# KEEP: converting products that are not yet scale candidates.
keep:
  min_conversions: 2   # minimum number of conversions to keep the product running

# Per-campaign overrides. A section applies when its key equals the campaign
# name or is contained in it (e.g. "low" matches "low_price"). Shorthand keys:
#   pause_spend -> pause.min_cost, watch_spend -> watch.max_cost,
#   scale_roas  -> scale.min_roas (in percent).
# Thresholds not listed here keep the global values above.
campaigns:
  high:
    pause_spend: 700
    watch_spend: 300
    scale_roas: 1200
  average:
    pause_spend: 450
    watch_spend: 250
    scale_roas: 900
  low:
    pause_spend: 220
    watch_spend: 120
    scale_roas: 700

# Budget redistribution thresholds (used by the budget optimizer).
# Marginal efficiency = campaign ROAS (x) multiplied by its growth share —
# an estimate of extra revenue per extra currency unit of budget.
budget:
  increase_efficiency: 10    # marginal efficiency at or above -> INCREASE
  decrease_efficiency: 3     # marginal efficiency at or below -> DECREASE
  shift_share: 0.15          # move this share of a DECREASE campaign's spend
  confidence_conversions: 30 # conversions needed for 100% confidence

# Campaign audit thresholds (used by the audit engine).
audit:
  profitable_roas: 500   # ROAS in percent at or above which a product is profitable
  high_roas: 1200        # ROAS in percent above which a product is high-ROAS
  low_ctr: 1.0           # CTR in percent below which a product is low-CTR

# Excel workbook rendering settings.
excel:
  font_name: Arial
  min_column_width: 9
  max_column_width: 45
  top_list_size: 10          # rows in Top Winners / Top Losers
  output_file: report.xlsx   # default workbook path (overridden by --output)

# Dashboard sheet rendering settings.
dashboard:
  title: "PPC Optimizer — Campaign Dashboard"
  header_color: "1F3864"
  card_fill_color: "F5F7FA"
  roas_color_scale_max: 10   # ROAS (x) mapped to the greenest color
